# .github/workflows/deploy.yml
# Builds apps/web with Vite and publishes dist/ to GitHub Pages.
name: Deploy StatLens to GitHub Pages

on:
  push:
    branches: [main]      # change if your default branch isn't "main"
  workflow_dispatch:       # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web   # the app lives in a subfolder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Injected from a repository variable (Settings > Secrets and variables > Actions > Variables).
          # A Google OAuth *client ID* is public by design, so a plain Variable is fine here.
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build

      # SAFETY NET: vite.config.ts's spa404 plugin should already have written this.
      # Copying again is idempotent and guarantees clean URLs work even if the plugin
      # is missing locally. Runs on Ubuntu, so `cp` is fine (you never run this on Windows).
      - name: Ensure SPA 404 fallback exists
        run: cp dist/index.html dist/404.html

      - name: Bypass Jekyll processing
        run: touch dist/.nojekyll

      # FAIL FAST: if the base path is wrong, the deployed site is a blank white page.
      # Better to fail here than to debug a white screen after deploying.
      - name: Verify build output
        run: |
          echo "--- dist/ ---"
          ls -la dist/
          echo "--- index.html ---"
          cat dist/index.html
          if ! grep -q '/StatLens/assets/' dist/index.html; then
            echo "::error::index.html does not reference /StatLens/assets/ — check 'base' in vite.config.ts (const REPO must match your repo name exactly)."
            exit 1
          fi
          if [ ! -f dist/404.html ]; then
            echo "::error::dist/404.html missing — clean URLs will 404 on refresh."
            exit 1
          fi
          echo "OK: base path and 404 fallback both look correct."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
